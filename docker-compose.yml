services:
  redis:
    image: redis:latest
    container_name: redis-compose
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"

  api:
    build: ./api-node
    container_name: api-node
    ports:
      - "3000:3000"
    depends_on:
      - redis
    env_file:
      - .env
    
  listener:
    build: ./listener
    container_name: listener
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env  




